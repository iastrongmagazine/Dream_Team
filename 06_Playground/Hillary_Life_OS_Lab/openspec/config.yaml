# openspec/config.yaml
schema: spec-driven

context: |
  Project: Hillary_Life_OS_Lab (Playground)
  Purpose: Implement Hillary Gridley workflows
  Stack: Obsidian + Templates + Automations
  Architecture: Vault-based note management with daily workflows
  Mode: openspec (file-based artifact storage)

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected templates and workflows
  specs:
    - Use Given/When/Then format for scenarios
    - Document UI/UX expectations for templates
  design:
    - Include YAML frontmatter structure
    - Document automation triggers
  tasks:
    - Group tasks by workflow (Quick Capture, Plan My Day, etc.)
    - Use hierarchical numbering (1.1, 1.2, etc.)
  apply:
    - Follow Obsidian vault conventions
    - Use YAML frontmatter for metadata
  verify:
    - Validate YAML syntax
    - Compare template output against spec scenarios
