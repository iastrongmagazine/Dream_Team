schema: spec-driven

context: |
  Tech stack: Go 1.22+, SQLite (modernc.org/sqlite), HTTP (net/http ServeMux)
  Architecture: Layered (store, sync, server, mcp, tui, setup)
  Testing: Go testing with hook injection, var-level test seams
  Style: gofmt, conventional commits, TDD coverage targets

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    tdd: true
    test_command: "go test ./... -cover"
    - Follow existing code patterns and conventions
  verify:
    test_command: "go test ./... -cover -race"
    build_command: "go build ./..."
    coverage_threshold: 80
  archive:
    - Warn before merging destructive deltas
